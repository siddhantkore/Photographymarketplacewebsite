services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      PREVIEW_BUCKET_NAME: ${PREVIEW_BUCKET_NAME}
      ORIGINAL_BUCKET_NAME: ${ORIGINAL_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb -p local/$$PREVIEW_BUCKET_NAME || true;
      /usr/bin/mc mb -p local/$$ORIGINAL_BUCKET_NAME || true;
      /usr/bin/mc anonymous set download local/$$PREVIEW_BUCKET_NAME || true;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      PREVIEW_PUBLIC_BASE_URL: http://localhost:9000/${PREVIEW_BUCKET_NAME}
      ORIGINAL_PUBLIC_BASE_URL: http://localhost:9000/${ORIGINAL_BUCKET_NAME}
      PREVIEW_BUCKET_NAME: ${PREVIEW_BUCKET_NAME}
      ORIGINAL_BUCKET_NAME: ${ORIGINAL_BUCKET_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - '5000:5000'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  postgres_data:
  minio_data:
