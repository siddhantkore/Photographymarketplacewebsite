        - Media
      summary: Upload media file
      description: Upload a media file to AWS S3 (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - type
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                type:
                  type: string
                  enum: [product, category, blog, advertisement, watermarked]
                  example: product
                  description: Type of media being uploaded
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: File uploaded successfully
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        format: uri
                        example: "https://s3.amazonaws.com/bucket/products/image_123.jpg"
                      key:
                        type: string
                        example: "products/image_123.jpg"
                      size:
                        type: integer
                        example: 2048576
                      mimeType:
                        type: string
                        example: "image/jpeg"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: File size exceeds maximum limit of 50MB
                
