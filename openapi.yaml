                      totalResults:
                        type: integer
                        example: 42
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login or register endpoint
      
  schemas:
    # ==================== USER SCHEMAS ====================
    User:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        role:
          type: string
          enum: [user, admin]
          example: "user"
        joinDate:
          type: string
          format: date-time
          example: "2025-12-15T00:00:00Z"
          
    UserAdmin:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            totalOrders:
              type: integer
              example: 5
            totalSpent:
              type: number
              example: 4599
            lastLoginAt:
              type: string
              format: date-time
              example: "2026-02-20T10:30:00Z"
            createdAt:
              type: string
              format: date-time
              example: "2025-12-15T00:00:00Z"
            updatedAt:
              type: string
              format: date-time
              example: "2026-02-20T10:30:00Z"
              
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          description: JWT access token (expires in 1 hour)
        refreshToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          description: JWT refresh token (expires in 7 days)
        expiresIn:
          type: integer
          example: 3600
          description: Access token expiration time in seconds
          
    # ==================== PRODUCT SCHEMAS ====================
    Product:
      type: object
      properties:
        id:
          type: string
          example: "1"
        title:
          type: string
          example: "Majestic Lion Portrait"
        description:
          type: string
          example: "A stunning close-up portrait of a male lion in golden hour light"
        type:
          type: string
          enum: [photo, bundle, typography, poster, banner]
          example: "photo"
        categories:
          type: array
          items:
            type: string
          example: ["Wildlife", "Nature"]
        tags:
          type: array
          items:
            type: string
          example: ["lion", "wildlife", "africa", "golden hour"]
        previewImage:
          type: string
          format: uri
          example: "https://s3.amazonaws.com/bucket/previews/lion_watermarked.jpg"
          description: Watermarked preview image
        bundleImages:
          type: array
          items:
            type: string
            format: uri
          example: ["https://s3.amazonaws.com/bucket/previews/img1.jpg"]
          description: Array of preview images for bundles
        orientation:
          type: string
          enum: [portrait, landscape, square]
          example: "portrait"
        uploadDate:
          type: string
          format: date
          example: "2026-02-15"
        popularity:
          type: integer
          example: 950
          description: Popularity score based on views and purchases
        prices:
          type: object
          properties:
            HD:
              type: number
              example: 299
            "Full HD":
              type: number
              example: 599
            "4K":
              type: number
              example: 999
        status:
          type: string
          enum: [active, inactive]
          example: "active"
        filesCount:
          type: integer
          example: 1
          description: Number of files in bundle (for bundle type)
        createdAt:
          type: string
          format: date-time
          example: "2026-02-15T12:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-02-15T12:00:00Z"
          
    ProductCreate:
      type: object
      required:
        - title
        - description
        - type
        - categories
        - previewImage
        - orientation
        - prices
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 200
          example: "Majestic Lion Portrait"
        description:
          type: string
          minLength: 20
          maxLength: 1000
          example: "A stunning close-up portrait of a male lion"
        type:
          type: string
          enum: [photo, bundle, typography, poster, banner]
          example: "photo"
        categories:
          type: array
          items:
            type: string
          minItems: 1
          example: ["Wildlife", "Nature"]
        tags:
          type: array
          items:
            type: string
          example: ["lion", "wildlife", "africa"]
        previewImage:
          type: string
          format: uri
          example: "https://s3.amazonaws.com/bucket/previews/lion.jpg"
        bundleImages:
          type: array
          items:
            type: string
            format: uri
        orientation:
          type: string
          enum: [portrait, landscape, square]
          example: "portrait"
        prices:
          type: object
          required:
            - HD
            - Full HD
            - 4K
          properties:
            HD:
              type: number
              minimum: 1
              example: 299
            "Full HD":
              type: number
              minimum: 1
              example: 599
            "4K":
              type: number
              minimum: 1
              example: 999
        status:
          type: string
          enum: [active, inactive]
          default: active
        filesCount:
          type: integer
          minimum: 1
          example: 1
          
    ProductUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 200
        description:
          type: string
          minLength: 20
          maxLength: 1000
        type:
          type: string
          enum: [photo, bundle, typography, poster, banner]
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        previewImage:
          type: string
          format: uri
        bundleImages:
          type: array
          items:
            type: string
            format: uri
        orientation:
          type: string
          enum: [portrait, landscape, square]
        prices:
          type: object
          properties:
            HD:
              type: number
              minimum: 1
            "Full HD":
              type: number
              minimum: 1
            "4K":
              type: number
              minimum: 1
        status:
          type: string
          enum: [active, inactive]
        filesCount:
          type: integer
          minimum: 1
          
    # ==================== CATEGORY SCHEMAS ====================
    Category:
